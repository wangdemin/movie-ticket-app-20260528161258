<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星光影院 - 在线购票</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
<div class="container">
<a class="navbar-brand" href="#" onclick="showPage('home')"><i class="bi bi-film"></i> 星光影院</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav me-auto">
<li class="nav-item"><a class="nav-link active" href="#" onclick="showPage('home')" id="nav-home">首页</a></li>
<li class="nav-item"><a class="nav-link" href="#" onclick="showPage('now-playing')" id="nav-now-playing">正在热映</a></li>
<li class="nav-item"><a class="nav-link" href="#" onclick="showPage('coming-soon')" id="nav-coming-soon">即将上映</a></li>
<li class="nav-item"><a class="nav-link" href="#" onclick="showPage('orders')" id="nav-orders">我的订单</a></li>
<li class="nav-item"><a class="nav-link" href="#" onclick="showPage('profile')" id="nav-profile">个人中心</a></li>
</ul>
<form class="d-flex" onsubmit="searchMovies(event)">
<input class="form-control me-2" type="search" placeholder="搜索电影..." id="searchInput">
<button class="btn btn-outline-light" type="submit"><i class="bi bi-search"></i></button>
</form>
</div>
</div>
</nav>

<div id="page-home" class="page-content">
<div class="hero-section">
<div class="hero-overlay"></div>
<div class="hero-content">
<h1>探索精彩电影世界</h1>
<p>最新大片，尽在星光影院</p>
<button class="btn btn-primary btn-lg" onclick="showPage('now-playing')">立即购票</button>
</div>
</div>
<div class="container mt-5">
<div class="section-header">
<h2><i class="bi bi-fire text-danger"></i> 正在热映</h2>
<a href="#" onclick="showPage('now-playing')">查看全部</a>
</div>
<div class="row" id="home-movies-grid"></div>
</div>
<div class="container mt-5 mb-5">
<div class="section-header">
<h2><i class="bi bi-calendar-event text-primary"></i> 即将上映</h2>
<a href="#" onclick="showPage('coming-soon')">查看全部</a>
</div>
<div class="row" id="home-coming-grid"></div>
</div>
</div>

<div id="page-now-playing" class="page-content d-none">
<div class="page-banner"><div class="container"><h1>正在热映</h1></div></div>
<div class="container mt-4"><div class="row" id="now-playing-grid"></div></div>
</div>

<div id="page-coming-soon" class="page-content d-none">
<div class="page-banner bg-info"><div class="container"><h1>即将上映</h1></div></div>
<div class="container mt-4"><div class="row" id="coming-soon-grid"></div></div>
</div>

<div id="page-booking" class="page-content d-none">
<div class="container mt-4">
<div class="row">
<div class="col-md-4">
<div class="card movie-info-card">
<img id="booking-poster" src="" class="card-img-top" alt="">
<div class="card-body">
<h5 id="booking-title" class="card-title"></h5>
<p id="booking-info" class="card-text"></p>
</div>
</div>
</div>
<div class="col-md-8">
<div class="card">
<div class="card-body">
<h5>选择影院</h5>
<div class="cinema-list" id="cinema-list"></div>
<h5 class="mt-4">选择场次</h5>
<div class="showtime-list" id="showtime-list"></div>
<h5 class="mt-4">选择座位</h5>
<div class="screen">银幕</div>
<div class="seat-map" id="seat-map"></div>
<div class="seat-legend">
<span><span class="seat available"></span>可选</span>
<span><span class="seat selected"></span>已选</span>
<span><span class="seat occupied"></span>已售</span>
</div>
<div class="booking-summary mt-4">
<p>已选座位: <span id="selected-seats">无</span></p>
<p>票价: <span id="ticket-price">0</span>元/张</p>
<h4>总计: <span id="total-price" class="text-danger">0</span>元</h4>
<button class="btn btn-primary" id="confirm-btn" disabled onclick="showCheckout()">确认选座</button>
</div>
</div>
</div>
</div>
</div>
</div>
</div>

<div id="page-orders" class="page-content d-none">
<div class="page-banner bg-success"><div class="container"><h1>我的订单</h1></div></div>
<div class="container mt-4"><div id="orders-list"></div></div>
</div>

<div id="page-profile" class="page-content d-none">
<div class="page-banner bg-secondary"><div class="container"><h1>个人中心</h1></div></div>
<div class="container mt-4">
<div class="row justify-content-center">
<div class="col-md-6">
<div class="card">
<div class="card-body text-center">
<div class="profile-avatar"><i class="bi bi-person-circle"></i></div>
<h4>电影爱好者</h4>
<p class="text-muted">会员等级: VIP</p>
<hr>
<div class="row text-center">
<div class="col-4"><h5 id="order-count">0</h5><small>订单数</small></div>
<div class="col-4"><h5 id="movie-count">0</h5><small>观影数</small></div>
<div class="col-4"><h5>98%</h5><small>好评率</small></div>
</div>
</div>
</div>
</div>
</div>
</div>
</div>

<div class="modal fade" id="checkoutModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title">订单确认</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<div id="checkout-details"></div>
</div>
<div class="modal-footer">
<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
<button type="button" class="btn btn-primary" onclick="submitOrder()">提交订单</button>
</div>
</div>
</div>
</div>

<div class="toast-container position-fixed top-0 end-0 p-3">
<div id="successToast" class="toast align-items-center text-white bg-success" role="alert">
<div class="d-flex">
<div class="toast-body"><i class="bi bi-check-circle"></i> 购票成功！</div>
<button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
